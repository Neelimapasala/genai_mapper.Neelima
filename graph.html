<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Knowledge Graph</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
    #mynetwork { width: 100%; height: 600px; background-color: #fff; border: 1px solid #ccc; border-radius: 8px; margin-top: 20px; }
    .legend { margin-top: 20px; font-size: 14px; text-align:center; }
    .legend span { display: inline-block; margin-right: 20px; }
    .legend-box { display: inline-block; width: 12px; height: 12px; margin-right: 5px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mt-4">🧠 Knowledge Graph</h2>
    <div id="mynetwork"></div>
    <div class="legend">
      <span><span class="legend-box" style="background-color:#0074D9;"></span>Person</span>
      <span><span class="legend-box" style="background-color:#2ECC40;"></span>Organization</span>
      <span><span class="legend-box" style="background-color:#FF851B;"></span>Location/Time</span>
      <span><span class="legend-box" style="background-color:#AAAAAA;"></span>Other</span>
    </div>
  </div>

  <script>
    const graphData = {{ graph_data | tojson }};
    const container = document.getElementById('mynetwork');
    const data = {
      nodes: new vis.DataSet(graphData.nodes.map(n => ({id: n.data.id, label: n.data.label}))),
      edges: new vis.DataSet(graphData.edges.map(e => ({from: e.data.source, to: e.data.target, label: e.data.label})))
    };
    const options = {
      layout: { improvedLayout: true },
      interaction: { hover: true },
      physics: { stabilization: true, barnesHut: { gravitationalConstant: -30000 } },
      edges: { font: { align: 'middle' }, color: { color: '#888', highlight: '#000' }, smooth: { type: 'dynamic' } },
      nodes: { font: { color: '#fff', size: 14 }, borderWidth: 1, shadow: true }
    };
    new vis.Network(container, data, options);
  </script>
</body>
</html>
